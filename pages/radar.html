<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#0d1117"/>
  <title>Radar Map – AeroSense</title>
  <link rel="manifest" href="../manifest.json"/>
  <link rel="apple-touch-icon" href="../assets/apple-touch-icon.png"/>
  <link rel="icon" type="image/png" sizes="192x192" href="../assets/icon-192.png"/>
  <link rel="icon" type="image/png" sizes="32x32" href="../assets/icon-192.png"/>
  <link rel="shortcut icon" href="../assets/icon-192.png"/>
  <link rel="apple-touch-icon" sizes="180x180" href="../assets/apple-touch-icon.png"/>
  <script>(function(){try{var s=JSON.parse(localStorage.getItem("aerosense_settings")||"{}");var t=s.theme||"dark";if(t==="system"){t=window.matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light";}document.documentElement.setAttribute("data-theme",t);}catch(e){document.documentElement.setAttribute("data-theme","dark");}})();</script>

  <link rel="stylesheet" href="../css/dark.css"/>
  <link rel="stylesheet" href="../css/light.css"/>
  <link rel="stylesheet" href="../css/animations.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
  <style>
    .radar-layout {
      display: grid;
      grid-template-columns: 1fr 280px;
      gap: var(--space-2xl);
      align-items: start;
    }
    @media (max-width: 1024px) { .radar-layout { grid-template-columns: 1fr; } }
    .map-wrapper {
      height: 520px;
      border-radius: var(--radius-xl);
      overflow: hidden;
      position: relative;
    }
    @media (max-width: 768px) { .map-wrapper { height: 340px; } }
    #map { width: 100%; height: 100%; }
    .map-fab {
      position: absolute;
      top: var(--space-lg);
      right: var(--space-lg);
      z-index: 500;
      display: flex;
      flex-direction: column;
      gap: var(--space-sm);
    }
    .map-ctrl-btn {
      width: 38px; height: 38px;
      border-radius: var(--radius-md);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; font-weight: 700;
      cursor: pointer;
      transition: background var(--transition-fast);
    }
    .layer-tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: var(--space-lg); }
    .layer-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 7px 14px;
      border-radius: var(--radius-full);
      font-size: var(--text-sm); font-weight: 600;
      transition: background var(--transition-fast), color var(--transition-fast);
    }
    [data-theme="dark"] .layer-btn.active,
    [data-theme="light"] .layer-btn.active { background: var(--color-brand) !important; color: #fff !important; }
    /* Make sure Leaflet tiles are visible above overflow:hidden clip */
    .leaflet-container { border-radius: 0; }
  </style>
</head>

<!-- Leaflet -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

<script>
/* ============================================================
   AeroSense Radar — self-contained (no ES modules)
   Runs after Leaflet CDN is loaded synchronously above.
============================================================ */
(function () {
  'use strict';

  // ── Helpers ─────────────────────────────────────────────────
  function getCached(key) {
    try {
      var raw = localStorage.getItem('aerosense_' + key);
      return raw ? JSON.parse(raw) : null;
    } catch (e) { return null; }
  }

  // ── State ────────────────────────────────────────────────────
  var map = null;
  var activeOverlay = null;
  var currentLayer = 'rain';
  var lat = 12.9716, lon = 77.5946;
  var locName = 'Your Location';

  var loc = getCached('location');
  if (loc && loc.lat) { lat = loc.lat; lon = loc.lon; locName = loc.name || locName; }

  // ── Layer configs (free/public endpoints only) ───────────────
  var LAYERS = {
    rain:   { url: 'https://tilecache.rainviewer.com/v2/coverage/0/256/{z}/{x}/{y}/2/1_1.png', opacity: 0.65 },
    clouds: { url: 'https://tile.openstreetmap.org/{z}/{x}/{y}.png', opacity: 0.0 }, // OSM base (no cloud overlay without API)
    wind:   { url: null },
    aqi:    { url: null },
    temp:   { url: null },
  };

  // ── Init map ─────────────────────────────────────────────────
  function initMap() {
    var mapEl = document.getElementById('map');
    if (!mapEl) return;

    // Set explicit height — Leaflet needs pixel dimensions
    var wrapper = mapEl.parentElement;
    var wh = wrapper ? wrapper.offsetHeight : 0;
    var targetH = wh > 20 ? wh : (window.innerWidth <= 768 ? 340 : 520);
    mapEl.style.height = targetH + 'px';
    mapEl.style.width  = '100%';

    var isDark = document.documentElement.getAttribute('data-theme') !== 'light';
    var tileUrl = isDark
      ? 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png'
      : 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png';

    map = L.map('map', {
      center:           [lat, lon],
      zoom:             10,
      zoomControl:      false,
      attributionControl: true,
      tap:              false,
      preferCanvas:     true,
    });

    // Base tiles
    L.tileLayer(tileUrl, {
      subdomains:  'abcd',
      maxZoom:     19,
      attribution: '&copy; <a href="https://openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com">CARTO</a>',
    }).addTo(map);

    // Location dot
    var dotIcon = L.divIcon({
      className: '',
      html: '<div style="width:14px;height:14px;border-radius:50%;background:#3b82f6;border:2.5px solid #fff;box-shadow:0 0 0 5px rgba(59,130,246,.3)"></div>',
      iconSize: [14, 14], iconAnchor: [7, 7],
    });
    L.marker([lat, lon], { icon: dotIcon }).addTo(map)
      .bindPopup('<b>' + locName + '</b>');

    // Force size recalc after browser has painted
    setTimeout(function () { if (map) map.invalidateSize(); }, 100);
    setTimeout(function () { if (map) map.invalidateSize(); }, 500);

    // Default overlay
    setOverlay('rain');
    updateSidebar();
  }

  // ── Overlay layers ───────────────────────────────────────────
  function setOverlay(key) {
    if (activeOverlay && map) { map.removeLayer(activeOverlay); activeOverlay = null; }
    currentLayer = key;
    var cfg = LAYERS[key];
    if (!cfg || !cfg.url) { return; }
    activeOverlay = L.tileLayer(cfg.url, {
      opacity:      cfg.opacity,
      subdomains:   'abcd',
      errorTileUrl: '',
    });
    activeOverlay.on('tileerror', function () {});
    if (map) activeOverlay.addTo(map);
  }

  // ── Layer tab buttons ────────────────────────────────────────
  function setupLayerButtons() {
    document.querySelectorAll('.layer-btn').forEach(function (btn) {
      btn.addEventListener('click', function () {
        document.querySelectorAll('.layer-btn').forEach(function (b) { b.classList.remove('active'); });
        btn.classList.add('active');
        setOverlay(btn.getAttribute('data-layer'));
      });
    });
  }

  // ── Map controls ─────────────────────────────────────────────
  function setupMapControls() {
    var zi = document.getElementById('zoom-in');
    var zo = document.getElementById('zoom-out');
    var rc = document.getElementById('map-recenter');
    if (zi) zi.addEventListener('click', function () { if (map) map.zoomIn(); });
    if (zo) zo.addEventListener('click', function () { if (map) map.zoomOut(); });
    if (rc) rc.addEventListener('click', function () {
      if (map) map.flyTo([lat, lon], 10, { duration: 0.8 });
    });
  }

  // ── Timeline sliders ─────────────────────────────────────────
  function setupTimeline() {
    var s1 = document.getElementById('timeline-slider');
    var s2 = document.getElementById('timeline-slider-2');
    var t1 = document.getElementById('timeline-time');
    var t2 = document.getElementById('timeline-time-2');
    var LABELS = ['-2h', '-1h', 'Now', '+1h', '+2h'];

    function sync(val) {
      var lbl = LABELS[+val] || 'Now';
      if (t1) t1.textContent = lbl;
      if (t2) t2.textContent = lbl;
      var nowBtns = document.querySelectorAll('.timeline-now-btn');
      nowBtns.forEach(function (b) {
        if (+val === 2) b.classList.add('hidden'); else b.classList.remove('hidden');
      });
      if (activeOverlay) {
        var base = LAYERS[currentLayer] ? (LAYERS[currentLayer].opacity || 0.65) : 0.65;
        activeOverlay.setOpacity(Math.max(0.2, base - Math.abs(+val - 2) * 0.12));
      }
    }

    if (s1) {
      s1.value = 2;
      s1.addEventListener('input', function () { if (s2) s2.value = s1.value; sync(s1.value); });
    }
    if (s2) {
      s2.value = 2;
      s2.addEventListener('input', function () { if (s1) s1.value = s2.value; sync(s2.value); });
    }

    document.querySelectorAll('#timeline-now-btn, #timeline-now-btn-2').forEach(function (btn) {
      btn.addEventListener('click', function () {
        if (s1) s1.value = 2;
        if (s2) s2.value = 2;
        sync(2);
      });
    });

    sync(2);
  }

  // ── Sidebar data ─────────────────────────────────────────────
  function updateSidebar() {
    var cw = getCached('weather_cache');
    var ca = getCached('aqi_cache');
    if (!cw || !ca || !cw.data || !ca.data) return;
    var w = cw.data, a = ca.data;

    // Compute AeroScore
    var aqi    = a.current.aqi || 50;
    var aqiPen = aqi <= 50 ? 0 : aqi <= 100 ? 10 : aqi <= 150 ? 20 : aqi <= 200 ? 35 : 50;
    var tDev   = Math.min(Math.abs(w.current.temp - 23) / 5, 3) * 5;
    var hDev   = (w.current.humidity < 30 || w.current.humidity > 70) ? 10 : 0;
    var uvPen  = w.current.uvIndex <= 2 ? 0 : w.current.uvIndex <= 5 ? 3 : w.current.uvIndex <= 7 ? 8 : 15;
    var wPen   = w.current.windSpeed < 20 ? 0 : w.current.windSpeed < 40 ? 6 : 12;
    var score  = Math.max(0, Math.min(100, Math.round(100 - aqiPen - tDev - hDev - uvPen - wPen)));
    var color  = score >= 80 ? '#22c55e' : score >= 60 ? '#eab308' : score >= 40 ? '#f97316' : '#ef4444';
    var label  = score >= 80 ? 'Good Conditions' : score >= 60 ? 'Fair Conditions' : score >= 40 ? 'Poor Conditions' : 'Hazardous';

    var asEl = document.getElementById('radar-aeroscore');
    if (asEl) {
      asEl.innerHTML =
        '<div class="sc-label">AeroScore™</div>' +
        '<div class="sc-value" style="color:' + color + '">' + score + '<span>/100</span></div>' +
        '<div class="sc-status" style="color:' + color + '">' + label + '</div>';
    }

    // Rain info
    var rainInfo = document.getElementById('rain-info');
    if (rainInfo && w.hourly) {
      var next = -1;
      for (var i = 0; i < w.hourly.length; i++) {
        if (w.hourly[i].precipProb >= 40) { next = i; break; }
      }
      var timeStr = next === -1 ? 'No rain expected' : next === 0 ? 'Rain now' : 'in ' + next + 'h';
      var pct     = next >= 0 ? w.hourly[next].precipProb : 0;
      var icon    = next === -1 ? '☀️' : pct > 60 ? '🌧' : '🌦';
      rainInfo.innerHTML =
        '<div style="font-size:var(--text-sm);opacity:.6;margin-bottom:6px">Next precipitation</div>' +
        '<div style="font-size:var(--text-xl);font-weight:700;color:var(--color-brand);margin-bottom:4px">' + timeStr + '</div>' +
        (pct > 0 ? '<div style="font-size:var(--text-sm);opacity:.6">' + pct + '% chance</div>' : '') +
        '<div style="margin-top:8px;font-size:2.5rem">' + icon + '</div>';
    }
  }

  // ── Boot ─────────────────────────────────────────────────────
  function boot() {
    setupLayerButtons();
    setupMapControls();
    setupTimeline();
    initMap();
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', boot);
  } else {
    boot();
  }

})();
</script>

<script type="module" src="../js/nav.js"></script>
</body>
</html>
